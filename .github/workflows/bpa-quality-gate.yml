name: Power BI Quality Gates

# Static quality gates for the PBIP projects that CHANGED in a Pull Request to
# main (incremental validation). A discovery job diffs the PR against the base
# branch and selects only the affected projects; the gates then run just for
# those (a manual workflow_dispatch validates every project):
#   1. PBIP metadata validation  -> file/structure integrity.
#   2. Report rules (PBI Inspector / Fab Inspector) -> loops changed .Report folders.
#   3. BPA (Tabular Editor 2)      -> loops changed semantic models; posts a
#      severity-grouped PR comment, applies a status label and fails the build
#      if any Severity 3 (Must Correct) issue is found.
# Report rules and BPA only run if metadata validation passes. Each gate posts
# its own PR comment and status label.

# ===========================================================================
# ON — GATILHOS: quando este workflow roda.
#   • workflow_dispatch  -> permite disparar manualmente (botão "Run workflow").
#                           Nesse modo, valida TODOS os projetos PBIP do repo.
#   • pull_request->main -> roda automaticamente a cada PR (aberto/atualizado)
#                           que aponta para a branch `main`. Valida apenas os
#                           projetos ALTERADOS no PR.
#   Obs.: um simples `push` NAO dispara os gates — só PR para main (ou manual).
# ===========================================================================
on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

# ===========================================================================
# PERMISSIONS — o que o GITHUB_TOKEN nativo pode fazer nesta execução.
#   • contents: read       -> ler/fazer checkout do código do repositório.
#   • pull-requests: write -> postar comentários e aplicar labels no PR.
#   Princípio do menor privilégio: concede só o necessário para os gates.
# ===========================================================================
permissions:
  contents: read
  pull-requests: write

# ===========================================================================
# JOBS — as etapas do pipeline (cada uma roda num runner efêmero, descartado
# ao final). Dependências entre jobs são declaradas com `needs`.
# Fluxo geral:
#   Discover_Projects
#     ├─(paralelo) Validate_PBIP_Metadata
#     └─(paralelo) Report_Rules_PBI_Inspector
#           └─ Get_Latest_TabularEditor2_Download_Link ─► BPA
# ===========================================================================
jobs:
  # -------------------------------------------------------------------------
  # JOB 0 — Discover_Projects: decide QUAIS projetos PBIP validar.
  # Faz o diff do PR contra a branch base e seleciona apenas os projetos
  # alterados; publica a lista no output `projects`, consumido pelos gates.
  # (Em run manual, seleciona todos os projetos.)
  # -------------------------------------------------------------------------
  Discover_Projects:
    runs-on: ubuntu-latest
    outputs:
      # Space-separated list of PBIP project root folders to validate.
      projects: ${{ steps.detect.outputs.projects }}
      count: ${{ steps.detect.outputs.count }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed PBIP projects
        id: detect
        shell: bash
        run: |
          set -euo pipefail
          # Every PBIP project root (top-level folder that contains a *.pbip).
          mapfile -t ALL < <(find . -name '*.pbip' -printf '%h\n' | sed 's|^\./||' | cut -d/ -f1 | sort -u)
          echo "Projetos PBIP no repo: ${ALL[*]:-<nenhum>}"
          SELECTED=()
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_REF="${{ github.event.pull_request.base.ref }}"
            git fetch --no-tags origin "$BASE_REF"
            CHANGED="$(git diff --name-only "origin/${BASE_REF}...HEAD")"
            echo "Arquivos alterados no PR:"; echo "$CHANGED"
            for proj in "${ALL[@]}"; do
              if echo "$CHANGED" | grep -q "^${proj}/"; then
                SELECTED+=("$proj")
              fi
            done
          else
            # Execucao manual (workflow_dispatch): valida todos os projetos.
            SELECTED=("${ALL[@]}")
          fi
          echo "Projetos selecionados para validacao: ${SELECTED[*]:-<nenhum>}"
          echo "projects=${SELECTED[*]:-}" >> "$GITHUB_OUTPUT"
          echo "count=${#SELECTED[@]}" >> "$GITHUB_OUTPUT"

  # -------------------------------------------------------------------------
  # JOB 1 (paralelo) — Validate_PBIP_Metadata: gate de INTEGRIDADE dos arquivos.
  # Roda checagens estáticas (JSON válido, referências .pbip/.pbir resolvem,
  # arquivos obrigatórios presentes, higiene do .gitignore, etc.) nos projetos
  # alterados. Comenta o resultado no PR e FALHA se houver problema bloqueante.
  # É o gate mais barato; os demais só seguem se ele passar.
  # -------------------------------------------------------------------------
  Validate_PBIP_Metadata:
    needs: Discover_Projects
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python dependencies
        run: pip install requests

      # Roda a validação estática; PBIP_PROJECT_DIRS = projetos alterados.
      - name: Validate PBIP metadata (static integrity checks, changed projects)
        env:
          # Space-separated list of changed projects (empty = nothing to validate).
          PBIP_PROJECT_DIRS: ${{ needs.Discover_Projects.outputs.projects }}
        run: python scripts/metadata_validation/pbip_metadata_validation.py

      # Guarda o JSON de resultado como artifact (download na aba Actions).
      - name: Upload metadata validation result
        uses: actions/upload-artifact@v4
        with:
          name: PBIP-Metadata-Validation-Result
          path: pbip_validation_results.json

      # Só em PR: publica o resultado como comentário + label `metadata-*`.
      - name: Comment on Pull Request
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: python scripts/metadata_validation/pbip_pr_comment.py

      # Falha o job (bloqueia) se a validação marcou erro. Roda DEPOIS do
      # comentário para o feedback aparecer no PR mesmo quando reprova.
      - name: Fail if metadata validation failed
        if: env.METADATA_VALIDATION_FAILED == 'true'
        run: |
          echo "PBIP metadata validation found blocking issues."
          exit 1
        shell: bash

  # -------------------------------------------------------------------------
  # JOB 1 (paralelo) — Report_Rules_PBI_Inspector: gate de BOAS PRÁTICAS do
  # RELATÓRIO (VisOps). Usa a CLI do Fab Inspector (PBI Inspector V2) em modo
  # LOCAL — lê os arquivos do .Report do checkout, sem Fabric e sem auth — e
  # valida os visuais/páginas dos relatórios alterados. Comenta no PR e falha
  # se houver violação. Roda em paralelo com o metadata (olham partes diferentes).
  # -------------------------------------------------------------------------
  Report_Rules_PBI_Inspector:
    needs: Discover_Projects
    runs-on: ubuntu-latest
    env:
      # Fab Inspector CLI release tag ('latest' or e.g. v3.4.0).
      FAB_INSPECTOR_VERSION: latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python dependencies
        run: pip install requests

      - name: Download and install Fab Inspector CLI
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update && sudo apt-get install -y unzip
          VERSION="${FAB_INSPECTOR_VERSION}"
          if [ "$VERSION" = "latest" ]; then
            VERSION="$(curl -fsSL https://api.github.com/repos/NatVanG/fab-inspector/releases/latest | grep '"tag_name"' | sed -E 's/.*"([^"]+)".*/\1/')"
          fi
          DOWNLOAD_URL="https://github.com/NatVanG/fab-inspector/releases/download/${VERSION}/linux-x64-FabInspCLI.zip"
          echo "Using Fab Inspector release: ${VERSION}"
          curl -fL "$DOWNLOAD_URL" -o FabInspCLI.zip
          unzip -o FabInspCLI.zip -d fab-inspector-cli
          FAB_INSP_BIN="$(find fab-inspector-cli -type f \( -name fab-inspector -o -name FabInspCLI \) | head -n 1)"
          if [ -z "$FAB_INSP_BIN" ]; then
            echo "Fab Inspector executable not found after unzip." && unzip -l FabInspCLI.zip && exit 1
          fi
          chmod +x "$FAB_INSP_BIN"
          sudo install -m 0755 "$FAB_INSP_BIN" /usr/local/bin/fab-inspector

      - name: Run Fab Inspector (report rules, changed .Report folders)
        shell: bash
        env:
          PROJECTS: ${{ needs.Discover_Projects.outputs.projects }}
        run: |
          set +e
          : > fabinspector_console.txt
          FAILED=false
          FOUND=false
          if [ -z "${PROJECTS// /}" ]; then
            echo "Nenhum projeto alterado; nada a inspecionar." | tee -a fabinspector_console.txt
          else
            # Inspect every .Report folder inside the changed projects only.
            for proj in $PROJECTS; do
              while IFS= read -r report; do
                [ -z "$report" ] && continue
                FOUND=true
                echo "===== Fab Inspector: ${report} =====" | tee -a fabinspector_console.txt
                fab-inspector \
                  -fabricitem "${report}" \
                  -rules "scripts/fab_validator/fabinspector-report-rules.json" \
                  -formats "Console,GitHub" | tee -a fabinspector_console.txt
                code=${PIPESTATUS[0]}
                echo "Fab Inspector exit code for ${report}: ${code}" | tee -a fabinspector_console.txt
                if [ "$code" -ne 0 ]; then FAILED=true; fi
              done < <(find "$proj" -type d -name '*.Report' | sort)
            done
            if [ "$FOUND" != "true" ]; then
              echo "Projetos alterados nao contem pastas .Report." | tee -a fabinspector_console.txt
            fi
          fi
          echo "REPORT_RULES_FAILED=$FAILED" >> $GITHUB_ENV
          exit 0

      # Guarda a saída do console do Fab Inspector como artifact.
      - name: Upload Fab Inspector console output
        uses: actions/upload-artifact@v4
        with:
          name: Fab-Inspector-Report-Rules-Result
          path: fabinspector_console.txt

      # Só em PR: publica o resultado como comentário + label `reportrules-*`.
      - name: Comment on Pull Request
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: python scripts/fab_validator/fabinspector_pr_comment.py

      # Falha o job se o Fab Inspector encontrou violações (após comentar).
      - name: Fail if report rules failed
        if: env.REPORT_RULES_FAILED == 'true'
        run: |
          echo "Fab Inspector found report rule violations."
          exit 1
        shell: bash

  # -------------------------------------------------------------------------
  # JOB 2 — Get_Latest_TabularEditor2_Download_Link: descobre a URL da última
  # versão do Tabular Editor 2 (via API) e a expõe como output para o job BPA.
  # `needs` os dois gates estáticos: só roda se metadata E report rules passarem.
  # -------------------------------------------------------------------------
  Get_Latest_TabularEditor2_Download_Link:
    needs: [Validate_PBIP_Metadata, Report_Rules_PBI_Inspector]
    runs-on: ubuntu-latest
    outputs:
      download_url: ${{ steps.get_url.outputs.DOWNLOAD_URL }}
    steps:
      - name: Get latest Tabular Editor 2 release using GitHub API
        id: get_url
        run: |
          # Consulta a release mais recente do TE2, monta a URL do .zip do CDN
          # e valida que responde 200 antes de expor a URL como output.
          release_info=$(curl -s https://api.github.com/repos/TabularEditor/TabularEditor/releases/latest)
          version=$(echo "$release_info" | jq -r '.tag_name' | sed 's/^v//')
          if [[ $version =~ ^[0-9]+\.[0-9]+$ ]]; then
            version="${version}.0"
          fi
          download_url="https://cdn.tabulareditor.com/files/TabularEditor.${version}.zip"
          status_code=$(curl -s -o /dev/null -w "%{http_code}" $download_url)
          if [[ "$status_code" -ne 200 ]]; then
            echo "Error: Download URL returned status code $status_code"
            exit 1
          fi
          echo "DOWNLOAD_URL=$download_url" >> $GITHUB_OUTPUT
        shell: bash

  # -------------------------------------------------------------------------
  # JOB 3 — BPA: gate de BOAS PRÁTICAS do MODELO semântico (Best Practice
  # Analyzer). Roda em Windows, baixa o Tabular Editor 2, executa a macro do
  # BPA em cada modelo alterado, classifica as violações por severidade,
  # comenta no PR e FALHA o build se houver Severity 3 (Must Correct).
  # `needs` Get_Latest (URL do TE2) + Discover_Projects (lista de projetos).
  # -------------------------------------------------------------------------
  BPA:
    needs: [Get_Latest_TabularEditor2_Download_Link, Discover_Projects]
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Baixa e descompacta o Tabular Editor 2 (usando a URL do job anterior).
      - name: Install Tabular Editor 2
        run: |
          curl -L ${{ needs.Get_Latest_TabularEditor2_Download_Link.outputs.download_url }} -o TabularEditor.zip
          mkdir -p TabularEditor
          unzip TabularEditor.zip -d TabularEditor
        shell: bash

      # Monta um prefixo (data-hora + repo + branch) para nomear os artifacts.
      - name: Set artifact prefix (CET timezone)
        run: |
          export TZ="Europe/Budapest"
          echo "PREFIX=$(date +'%Y%m%d-%H%M')-${{ github.repository }}-${{ github.head_ref || github.ref_name }}" | sed 's/\//-/g' >> $GITHUB_ENV
        shell: bash

      - name: Run BPA macro script (changed semantic models)
        shell: bash
        env:
          PROJECTS: ${{ needs.Discover_Projects.outputs.projects }}
        run: |
          set -e
          SCRIPT_PATH="scripts/bpa/Custom_TA_Macro_for_BPA.csx"
          first=1
          : > combined_BPA_Results.csv
          if [ -n "${PROJECTS// /}" ]; then
            # Analyze every semantic model inside the changed projects only.
            for proj in $PROJECTS; do
              while IFS= read -r model; do
                [ -z "$model" ] && continue
                echo "===== BPA: ${model} ====="
                TMDL_PATH="$model" ./TabularEditor/TabularEditor.exe "$model" -S "$SCRIPT_PATH"
                if [ "$first" = "1" ]; then
                  cat BPA_Results.csv > combined_BPA_Results.csv
                  first=0
                else
                  tail -n +2 BPA_Results.csv >> combined_BPA_Results.csv
                fi
              done < <(find "$proj" -type f -path '*.SemanticModel/definition/database.tmdl' | sort)
            done
          fi
          if [ ! -s combined_BPA_Results.csv ]; then
            # No models analyzed -> header-only CSV so the analysis passes cleanly.
            printf 'RuleCategory\tRuleID\tRuleName\tRuleDescription\tObjectName\tObjectType\tRuleSeverity\tHasFixExpression\n' > combined_BPA_Results.csv
          fi
          mv combined_BPA_Results.csv BPA_Results.csv
          echo "Combined BPA results:"
          cat BPA_Results.csv

      - name: Upload BPA CSV result
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PREFIX }}_BPA-CSV-Result
          path: BPA_Results.csv

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python dependencies
        run: pip install pandas requests tabulate

      # Cruza o CSV com o BPA_Rules.json (CustomSeverity), separa por severidade
      # e seta SEVERITY_3_FOUND (que decide se o gate reprova).
      - name: Run BPA result analysis
        run: python scripts/bpa/bpa_result_analysis.py

      # Sobe os CSVs classificados (must_correct/correct_asap/nice_to_have).
      - name: Upload Python artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PREFIX }}_Python-Artifacts
          path: |
            must_correct.csv
            correct_asap.csv
            nice_to_have.csv

      # Só em PR: publica o comentário do BPA + label `bpa-*`.
      - name: Comment on Pull Request
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: python scripts/bpa/pr_comment.py

      # Falha o build se houver violação Severity 3 (Must Correct) — após comentar.
      - name: Fail if Severity 3 issues found
        if: env.SEVERITY_3_FOUND == 'true'
        run: |
          echo "Model cannot be deployed because Severity 3 (Must Correct) issues were found."
          exit 1
        shell: bash
